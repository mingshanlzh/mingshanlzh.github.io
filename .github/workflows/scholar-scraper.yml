name: Google Scholar Sync

on:
  schedule:
    - cron: "0 2 * * 1"  # Every Monday at 2 AM UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install scholarly requests

      - name: Run Scholar scraper
        run: python scripts/scrape_scholar.py
        env:
          SCHOLAR_USER_ID: TeSuUycAAAAJ

      - name: Commit updated publications
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/publications.json
          git diff --cached --quiet || git commit -m "chore: auto-update publications from Google Scholar [skip ci]"
          git push
